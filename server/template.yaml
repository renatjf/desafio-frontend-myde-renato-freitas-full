AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Backend do desafio de frontend — inbox de atendimento WhatsApp + IA

Parameters:
  SeedToken:
    Type: String
    Description: Token para a rota administrativa /admin/seed
    Default: troque-este-token
  OpenAiApiKey:
    Type: String
    Description: Chave da OpenAI (opcional). Vazio = /ai/suggest usa sugestao mock.
    Default: ""
    NoEcho: true

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 15
    MemorySize: 256

Resources:
  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref Table
          SEED_TOKEN: !Ref SeedToken
          OPENAI_API_KEY: !Ref OpenAiApiKey
          OPENAI_MODEL: gpt-4o-mini
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Table
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: URL base da API (use em NEXT_PUBLIC_API_URL)
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref Table
